<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Document</title>
	<link rel="stylesheet" href="style.css">
	</link>
	<script src="script.js" defer></script>
</head>

<body>
	<div class="player" id="X">
		<p class="icon">X</p>
		<p class="wins">Wins: 0</p>
	</div>
	<div id="game-count">
		<p id="total-games">Game 1</p>
	</div>
	<div id="board">
		<div id="next">
			<p id="winner">Winner</p>
			<button id="next-button">Next Game</button>
		</div>
		<button class="cell" id="0"></button>
		<button class="cell" id="1"></button>
		<button class="cell" id="2"></button>
		<button class="cell" id="3"></button>
		<button class="cell" id="4"></button>
		<button class="cell" id="5"></button>
		<button class="cell" id="6"></button>
		<button class="cell" id="7"></button>
		<button class="cell" id="8"></button>
	</div>
	<div class="player" id="O">
		<p class="icon">O</p>
		<p class="wins">Wins: 0</p>
	</div>
	<div class="side-buttons">
		<button id="restart">Restart</button>
		<button id="mode">Mode</button>
	</div>
</body>

</html>
